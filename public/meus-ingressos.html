<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="icon" href="/favicon.png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Meus Ingressos - Tropical Vibes</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 12%, rgba(251, 191, 36, 0.22), transparent 24%),
        radial-gradient(circle at 85% 20%, rgba(20, 184, 166, 0.22), transparent 24%),
        linear-gradient(135deg, #ffffff 0%, #effcff 45%, #dff8f7 100%);
      color: #082f49;
      overflow-x: hidden;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .navbar {
      width: 100%;
      position: sticky;
      top: 0;
      z-index: 999;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(14, 165, 233, 0.12);
    }

    .nav-content {
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .logo {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: #082f49;
    }

    .logo span {
      color: #14b8a6;
      font-style: italic;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 22px;
      flex-wrap: wrap;
      font-weight: 700;
      font-size: 14px;
      color: #0f3f55;
    }

    .nav-links a:hover {
      color: #14b8a6;
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 56px 22px 80px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 18px;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }

    .badge {
      display: inline-block;
      background: rgba(20, 184, 166, 0.14);
      color: #0f766e;
      border: 1px solid rgba(20, 184, 166, 0.18);
      padding: 9px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 900;
      margin-bottom: 16px;
    }

    .hero h1 {
      font-size: clamp(42px, 6vw, 72px);
      line-height: 0.95;
      letter-spacing: -0.07em;
      text-transform: uppercase;
      margin-bottom: 14px;
      color: #082f49;
    }

    .hero h1 span {
      display: block;
      color: #14b8a6;
      font-style: italic;
      transform: rotate(-1deg);
    }

    .hero p {
      color: #164e63;
      line-height: 1.7;
      max-width: 760px;
      font-size: 17px;
      font-weight: 600;
    }

    .refresh-btn {
      border: none;
      border-radius: 18px;
      padding: 16px 22px;
      background: linear-gradient(90deg, #14b8a6, #06b6d4);
      color: white;
      font-weight: 900;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 18px 36px rgba(20, 184, 166, 0.24);
    }

    .refresh-btn:hover {
      transform: translateY(-2px);
    }

    .tickets-grid {
      display: grid;
      gap: 24px;
    }

    .ticket-card {
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(14, 165, 233, 0.14);
      border-radius: 34px;
      overflow: hidden;
      box-shadow: 0 28px 70px rgba(8, 47, 73, 0.14);
      backdrop-filter: blur(14px);
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      position: relative;
    }

    .ticket-card::before,
    .ticket-card::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 22px;
      height: 22px;
      background: #effcff;
      border-radius: 50%;
      transform: translateY(-50%);
      border: 1px solid rgba(14, 165, 233, 0.14);
      z-index: 2;
    }

    .ticket-card::before {
      left: -11px;
    }

    .ticket-card::after {
      right: -11px;
    }

    .ticket-left {
      padding: 30px;
      border-right: 1px dashed rgba(14, 165, 233, 0.25);
    }

    .ticket-right {
      padding: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top right, rgba(251, 191, 36, 0.20), transparent 34%),
        linear-gradient(180deg, #ffffff, #ecfeff);
    }

    .ticket-tags {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .tag {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      border: 1px solid transparent;
    }

    .tag-teal {
      background: rgba(20, 184, 166, 0.14);
      color: #0f766e;
      border-color: rgba(20, 184, 166, 0.18);
    }

    .tag-sky {
      background: rgba(14, 165, 233, 0.12);
      color: #0369a1;
      border-color: rgba(14, 165, 233, 0.16);
    }

    .tag-gold {
      background: rgba(251, 191, 36, 0.18);
      color: #92400e;
      border-color: rgba(251, 191, 36, 0.24);
    }

    .tag-red {
      background: rgba(239, 68, 68, 0.12);
      color: #dc2626;
      border-color: rgba(239, 68, 68, 0.18);
    }

    .ticket-event {
      font-size: 32px;
      color: #082f49;
      margin-bottom: 10px;
      letter-spacing: -0.05em;
    }

    .ticket-sub {
      color: #475569;
      line-height: 1.7;
      margin-bottom: 22px;
      max-width: 620px;
      font-weight: 600;
    }

    .ticket-meta {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .meta-box {
      background: #f0fdfa;
      border: 1px solid rgba(20, 184, 166, 0.16);
      border-radius: 18px;
      padding: 15px 16px;
    }

    .meta-box small {
      display: block;
      color: #0891b2;
      margin-bottom: 7px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 900;
    }

    .meta-box strong {
      color: #082f49;
      line-height: 1.5;
      font-size: 15px;
      word-break: break-word;
    }

    .qr-panel {
      width: 100%;
      max-width: 290px;
      text-align: center;
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(14, 165, 233, 0.14);
      border-radius: 28px;
      padding: 22px;
      box-shadow: 0 18px 44px rgba(8, 47, 73, 0.10);
    }

    .qr-panel img {
      width: 100%;
      max-width: 220px;
      background: white;
      padding: 12px;
      border-radius: 20px;
      margin-bottom: 14px;
      border: 1px solid rgba(14, 165, 233, 0.12);
    }

    .qr-panel h3 {
      font-size: 20px;
      color: #082f49;
      margin-bottom: 8px;
      letter-spacing: -0.03em;
    }

    .qr-panel p {
      color: #475569;
      line-height: 1.6;
      font-size: 14px;
      font-weight: 600;
    }

    .empty-box {
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(14, 165, 233, 0.14);
      border-radius: 32px;
      padding: 36px;
      text-align: center;
      color: #475569;
      box-shadow: 0 28px 70px rgba(8, 47, 73, 0.14);
      backdrop-filter: blur(14px);
    }

    .empty-box h2 {
      font-size: 30px;
      color: #082f49;
      margin-bottom: 10px;
      letter-spacing: -0.04em;
    }

    .empty-box p {
      color: #475569;
      line-height: 1.7;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .empty-box a {
      display: inline-block;
      padding: 15px 22px;
      border-radius: 18px;
      background: linear-gradient(90deg, #14b8a6, #06b6d4);
      color: white;
      font-weight: 900;
      box-shadow: 0 18px 36px rgba(20, 184, 166, 0.24);
    }

    @media (max-width: 980px) {
      .ticket-card {
        grid-template-columns: 1fr;
      }

      .ticket-left {
        border-right: none;
        border-bottom: 1px dashed rgba(14, 165, 233, 0.25);
      }

      .hero h1 {
        font-size: 44px;
      }
    }

    @media (max-width: 680px) {
      .nav-content {
        justify-content: center;
      }

      .nav-links {
        justify-content: center;
      }

      .ticket-meta {
        grid-template-columns: 1fr;
      }

      .ticket-left,
      .ticket-right {
        padding: 22px;
      }
    }
  </style>
</head>

<body>
  <header class="navbar">
    <div class="nav-content">
      <a href="/index.html" class="logo">TROPICAL <span>Vibes</span></a>

      <nav class="nav-links">
        <a href="/index.html">Início</a>
        <a href="/ingressos.html">Ingressos</a>
        <a href="/login.html">Login</a>
        <a href="/admin.html">Admin</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <section class="hero">
      <div>
        <div class="badge">Área do cliente 🌴</div>
        <h1>Seus <span>tickets digitais</span></h1>
        <p>
          Aqui ficam todos os seus ingressos emitidos, com QR Code individual
          e status atualizado para facilitar sua entrada no Tropical Vibes.
        </p>
      </div>

      <button class="refresh-btn" onclick="carregar()">Atualizar ingressos</button>
    </section>

    <section class="tickets-grid" id="lista"></section>
  </main>

  <script>
    const token = localStorage.getItem('token');

    if (!token) {
      alert('Faça login primeiro.');
      window.location.href = '/login.html';
    }

    function gerarQrLocal(codigo) {
      return `https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=${encodeURIComponent(codigo)}`;
    }

    function formatDate(data) {
      if (!data) return '—';
      return new Date(data).toLocaleString('pt-BR');
    }

    function getTipoInfo(ticket) {
      const tipo = ticket.tipo || 'openbar';

      if (tipo === 'pista') {
        return {
          nome: 'Pista Tropical',
          tag: '<span class="tag tag-sky">Pista</span>',
          preco: ticket.preco ? `R$ ${ticket.preco},00` : 'R$ 40,00'
        };
      }

      return {
        nome: 'Open Bar Tropical',
        tag: '<span class="tag tag-teal">Open Bar</span>',
        preco: ticket.preco ? `R$ ${ticket.preco},00` : 'R$ 80,00'
      };
    }

    function renderTicket(ticket) {
      const statusTag = ticket.usado
        ? '<span class="tag tag-red">Ingresso usado</span>'
        : '<span class="tag tag-gold">Ingresso válido</span>';

      const tipoInfo = getTipoInfo(ticket);

      return `
        <article class="ticket-card">
          <div class="ticket-left">
            <div class="ticket-tags">
              ${tipoInfo.tag}
              ${statusTag}
            </div>

            <h2 class="ticket-event">Tropical Vibes 2026</h2>
            <p class="ticket-sub">
              Seu ingresso está salvo com segurança e pronto para ser validado na entrada.
              Apresente o QR Code no acesso ao evento junto com documento com foto.
            </p>

            <div class="ticket-meta">
              <div class="meta-box">
                <small>Tipo de ingresso</small>
                <strong>${tipoInfo.nome}</strong>
              </div>

              <div class="meta-box">
                <small>Valor</small>
                <strong>${tipoInfo.preco}</strong>
              </div>

              <div class="meta-box">
                <small>Código do ingresso</small>
                <strong>${ticket.codigo || '—'}</strong>
              </div>

              <div class="meta-box">
                <small>Status</small>
                <strong>${ticket.usado ? 'Já utilizado' : 'Disponível para uso'}</strong>
              </div>

              <div class="meta-box">
                <small>Data da emissão</small>
                <strong>${formatDate(ticket.createdAt)}</strong>
              </div>

              <div class="meta-box">
                <small>Evento</small>
                <strong>Tropical Vibes 2026</strong>
              </div>
            </div>
          </div>

          <div class="ticket-right">
            <div class="qr-panel">
              <img src="${gerarQrLocal(ticket.codigo)}" alt="QR Code do ingresso" />
              <h3>QR Code do ingresso</h3>
              <p>
                Apresente este QR Code na entrada para validar seu acesso ao evento.
              </p>
            </div>
          </div>
        </article>
      `;
    }

    async function carregar() {
      const lista = document.getElementById('lista');
      lista.innerHTML = `
        <div class="empty-box">
          <h2>Carregando seus ingressos...</h2>
          <p>Estamos buscando os tickets emitidos na sua conta.</p>
        </div>
      `;

      try {
        const res = await fetch('/meus-ingressos', {
          headers: {
            'Authorization': token
          }
        });

        const data = await res.json();

        if (!res.ok) {
          lista.innerHTML = `
            <div class="empty-box">
              <h2>Erro ao carregar ingressos</h2>
              <p>Não foi possível buscar seus tickets agora.</p>
            </div>
          `;
          return;
        }

        if (!data.length) {
          lista.innerHTML = `
            <div class="empty-box">
              <h2>Nenhum ingresso encontrado</h2>
              <p>Você ainda não possui ingressos emitidos na sua conta.</p>
              <a href="/ingressos.html">Comprar ingresso</a>
            </div>
          `;
          return;
        }

        lista.innerHTML = data.map(renderTicket).join('');
      } catch (error) {
        lista.innerHTML = `
          <div class="empty-box">
            <h2>Erro de conexão</h2>
            <p>Não foi possível carregar seus ingressos no momento.</p>
          </div>
        `;
      }
    }

    carregar();
  </script>
</body>
</html>
